<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海哥选股器 - 智能选股分析平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .stock-item:last-child {
            border-bottom: none;
        }
        
        .stock-code {
            font-weight: 600;
            color: #667eea;
        }
        
        .stock-name {
            color: #666;
        }
        
        .stock-score {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            color: white;
            padding: 40px 0;
            opacity: 0.8;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 海哥选股器</h1>
            <p>智能选股分析平台 - 基于通达信数据 + AI分析</p>
        </div>
        
        <div class="main-content">
            <!-- 每日选股 -->
            <div class="card">
                <h2>📊 每日精选</h2>
                <div class="form-group">
                    <label>选股策略</label>
                    <select id="strategy">
                        <option value="daily">日常选股</option>
                        <option value="auction">竞价选股</option>
                        <option value="breakout">突破选股</option>
                    </select>
                </div>
                <button class="btn" onclick="getDailySelection()">获取每日精选</button>
                <div id="daily-result"></div>
            </div>
            
            <!-- 股票分析 -->
            <div class="card">
                <h2>🔍 个股分析</h2>
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="stock-code" placeholder="例如：000006" maxlength="6">
                </div>
                <div class="form-group">
                    <label>分析类型</label>
                    <select id="analysis-type">
                        <option value="technical">技术分析</option>
                        <option value="fundamental">基本面分析</option>
                        <option value="comprehensive">综合分析</option>
                    </select>
                </div>
                <button class="btn" onclick="analyzeStock()">开始分析</button>
                <div id="analysis-result"></div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 海哥选股器 | 数据仅供参考，投资需谨慎</p>
            <p><a href="#">使用帮助</a> | <a href="#">隐私政策</a></p>
        </div>
    </div>
    
    <script>
        // 获取每日精选
        async function getDailySelection() {
            const resultDiv = document.getElementById('daily-result');
            const strategy = document.getElementById('strategy').value;
            
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在获取精选股票...</div>';
            
            try {
                const response = await fetch(`/api/daily_picker.py?strategy=${strategy}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    let html = '<div class="result"><h3>📈 今日精选 (' + data.date + ')</h3>';
                    
                    data.data.forEach(stock => {
                        html += `
                            <div class="stock-item">
                                <div>
                                    <span class="stock-code">${stock.code}</span>
                                    <span class="stock-name">${stock.name}</span>
                                </div>
                                <div>
                                    <span class="stock-score">${stock.score}分</span>
                                    <small>${stock.reason}</small>
                                </div>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="result">获取失败，请稍后重试</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="result">网络错误，请检查连接</div>';
            }
        }
        
        // 分析股票
        async function analyzeStock() {
            const code = document.getElementById('stock-code').value.trim();
            const analysisType = document.getElementById('analysis-type').value;
            const resultDiv = document.getElementById('analysis-result');
            
            if (!code || code.length !== 6) {
                resultDiv.innerHTML = '<div class="result">请输入有效的6位股票代码</div>';
                return;
            }
            
            resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在分析股票...</div>';
            
            try {
                const response = await fetch(`/api/analyze.py?code=${code}&type=${analysisType}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const analysis = data.data;
                    let html = '<div class="result">';
                    html += `<h3>📊 ${analysis.name} (${analysis.code})</h3>`;
                    html += `<p><strong>分析日期:</strong> ${analysis.date}</p>`;
                    html += `<p><strong>综合评分:</strong> ${analysis.score}/10</p>`;
                    html += `<p><strong>投资建议:</strong> ${analysis.recommendation}</p>`;
                    
                    if (analysis.technical) {
                        html += '<h4 style="margin-top:15px;">技术指标</h4>';
                        html += '<ul>';
                        for (const [key, value] of Object.entries(analysis.technical)) {
                            html += `<li><strong>${key.toUpperCase()}:</strong> ${value}</li>`;
                        }
                        html += '</ul>';
                    }
                    
                    html += '</div>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="result">分析失败，请稍后重试</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<div class="result">网络错误，请检查连接</div>';
            }
        }
        
        // 页面加载时自动获取每日精选
        window.onload = function() {
            getDailySelection();
        };
    </script>
</body>
</html>
